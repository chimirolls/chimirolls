<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформлення замовлення</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="page-order">

<div class="app">

  <header class="app-header">

    <div class="top-bar" id="topBar">
      <div class="logo">
        <img src="logo_1.png">
        <span>ChiMi Rolls</span>
      </div>

      <div class="header-actions">
        <a href="delivery.html" class="delivery-link">
          <img src="icons/delivery.png">
          <span>Доставка</span>
        </a>

        <a href="tel:+380931449496" class="call-btn">
          <img src="icons/call.png">
        </a>
      </div>
    </div>

    <!-- НАЗАД -->
    <div class="back-bar">

  <button class="back-btn-ord" onclick="history.back()">
      <img src="icons/back_icon.png" alt="back">
    </button>

    <h2>Оформлення замовлення</h2>

  </div>
  </header>

  <main class="menu page-order">
    <!-- Модальне вікно -->
<div id="loading-modal" class="loading-modal">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <p>Зачекайте, ваше замовлення відправляється...</p>
  </div>
</div>
  <form id="order-form">

    <!-- Контактні дані -->
    <h3>Контактні дані</h3>
    <div class="form-card">
      <label>Ім’я</label>
      <input type="text" id="name" placeholder="Ім'я" required>

      <label>Номер телефону</label>
      <input type="tel" id="phone" placeholder="+380XXXXXXXXX" required>
    </div>

    <!-- Доставка -->
    <h3>Доставка</h3>
    <div class="form-card">
      <label>Село</label>
      <input type="text" id="city" placeholder="н.п Паволоч">

      <label>Назва та № вулиці</label>
      <input type="text" id="street" placeholder="вулиця">

      <label>Бажаний час</label>
      <div class="select-wrapper">
        <select id="time">
          <option value="">Оберіть час</option>
          <option value="Найближчий час">Найближчий час</option>
          <option value="15:00">15:00</option>
          <option value="17:00">17:00</option>
          <option value="19:00">19:00</option>
          <option value="21:00">21:00</option>
        </select>
      </div>

      <label>Кількість персон</label>
      <input type="number" id="persons" value="1" min="1">
    </div>

    <!-- Коментар -->
    <h3>Коментар (за бажанням)</h3>
    <div class="form-card">
      <textarea id="comment"></textarea>
    </div>
    
    <!-- КОНТЕЙНЕР ДЛЯ СУМИ І КНОПКИ -->
    <div class="total-container">
      <!-- СУМА -->
      <div class="total">
        <span>Сума</span>
        <span id="total-price">0 грн</span>
      </div>

      <!-- КНОПКА -->
      <button type="submit" class="submit-btn">
  Надіслати форму
  
</button>

  </form>

</main>

<script src="order.js"></script>
</body>
</html>
