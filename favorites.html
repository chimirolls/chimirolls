<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChiMi Rolls - Обране</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="page-favorites">

<div class="app">

  <header class="app-header">

    <div class="top-bar">
      <div class="logo">
        <img src="logo_1.png">
        <span>ChiMi Rolls</span>
      </div>

      <div class="header-actions">

      <!-- 🚚 доставка -->
      <a href="delivery.html" class="delivery-link">
        <img src="icons/delivery.png" alt="">
        <span>Доставка</span>
      </a>

      <!-- 📞 дзвінок -->
      <a href="tel:+380931449496" class="call-btn">
        <img src="icons/call.png" alt="">
      </a>

    </div>
    </div>

    <div class="sticky-part">
    <nav class="tabs">
      <a href="index.html">Роли</a>
      <a href="sets.html">Сети</a>
      <a href="favorites.html" class="active">Обране</a>
    </nav>

    
  </div>
    <div class="favorites-top">
      <h2>Замовляємо?</h2>
      <button id="clear-favorites" class="clear-btn">Очистити</button>
    </div>
  </header>

  <main class="menu">

  <div class="favorites-layout">

    <section class="category" id="rolls-container"></section>

    <div class="favorites-summary">
      <div class="total">
        <span>Сума</span>
        <span id="total-price">0 ₴</span>
      </div>

      <a href="tel:+380931449496" class="order-btn">
        <span>Замовити в один клік</span>
        <img src="icons/call.png" alt="call">
      </a>
    </div>

  </div>

</main>
  <div id="empty-favorites" class="empty-favorites" style="display: none;">
    <div class="empty-img"></div>
    <h3>Ви ще нічого не обрали</h3>
    <p>Але це ніколи не пізно виправити :)</p>
    <a href="index.html" class="go-menu-btn">В МЕНЮ</a>
  </div>
</div>
<script src="script.js"></script>

</body>
</html>
